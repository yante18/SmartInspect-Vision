version: '3.8'

services:
  # 主应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: car-detect-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - PROJECT_NAME=${PROJECT_NAME:-智检慧眼}
      - API_PREFIX=${API_PREFIX:-/api/v1}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-10485760}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=Asia/Shanghai
    volumes:
      # 持久化上传文件
      - ./static/upload:/app/static/upload
      # 持久化数据库
      - ./data:/app/data
      # 持久化日志
      - ./logs:/app/logs
    networks:
      - car-detect-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Nginx反向代理（可选，需要时取消注释）
  # nginx:
  #   image: nginx:alpine
  #   container_name: car-detect-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf
  #     - ./static:/usr/share/nginx/html/static
  #     - ./ssl:/etc/nginx/ssl  # SSL证书目录
  #   depends_on:
  #     - app
  #   networks:
  #     - car-detect-network

networks:
  car-detect-network:
    driver: bridge

volumes:
  upload-data:
  db-data:
  log-data:
