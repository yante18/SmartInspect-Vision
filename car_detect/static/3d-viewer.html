<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智检慧眼 - 小米 SU7 3D模型展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            overflow: hidden;
            background-color: #f5f7fa;
        }

        .sketchfab-embed-wrapper {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .sketchfab-embed-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            color: #1677ff;
            z-index: 100;
        }

        .nav {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        .nav a {
            color: #1677ff;
            text-decoration: none;
            background: white;
            padding: 10px 16px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .tip {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            color: #666;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="sketchfab-embed-wrapper">
        <div id="loading"> 3D模型加载中...</div>
        
        <div class="nav">
            <a href="/">← 返回检测页面</a>
        </div>

        <div class="tip">
            鼠标拖拽旋转 | 滚轮缩放 | 点击部件查看详情
        </div>

        <iframe 
            title="Xiaomi Su7 | www.vecarz.com" 
            frameborder="0" 
            allowfullscreen 
            mozallowfullscreen="true" 
            webkitallowfullscreen="true" 
            allow="autoplay; fullscreen; xr-spatial-tracking" 
            xr-spatial-tracking 
            execution-while-out-of-viewport 
            execution-while-not-rendered 
            web-share 
            src="https://sketchfab.com/models/de1a913feac64cbe82fa1269e2de4d7b/embed">
        </iframe>
    </div>

    <script>
        // 隐藏加载提示
        window.addEventListener('load', function() {
            setTimeout(function() {
                const loading = document.getElementById('loading');
                if (loading) {
                    loading.style.display = 'none';
                }
            }, 1000);
        });
    </script>
</body>
</html>
