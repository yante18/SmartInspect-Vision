# Car Damage Detection Dataset Configuration
# YOLOv8 数据集配置文件

# 数据集根路径（相对于项目目录）
path: ./datasets/car-damage-dataset

# 训练集和验证集路径（相对于 path）
train: images/train
val: images/val

# 类别数量
nc: 4

# 类别名称
names:
  0: scratch    # 划痕
  1: dent       # 凹陷
  2: collision  # 碰撞
  3: broken     # 破损

# 数据增强策略（训练时自动应用）
hsv_h: 0.015    # 色调扰动
hsv_s: 0.7      # 饱和度扰动
hsv_v: 0.4      # 亮度扰动
degrees: 5      # 旋转角度（±5度）
translate: 0.2  # 平移比例
scale: 0.5      # 缩放范围
flipud: 0.0     # 垂直翻转概率
fliplr: 0.5     # 水平翻转概率
mosaic: 1.0     # Mosaic 增强概率
